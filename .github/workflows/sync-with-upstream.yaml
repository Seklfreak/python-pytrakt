name: Sync patch branch with upstream

# Weekly rebase of the patch branch on top of upstream/main, plus a
# manual trigger. Force-pushes when clean; opens an issue on conflict.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: fix-show-collection-stopiteration
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/glensc/python-pytrakt.git
          git fetch upstream main

      - name: Rebase onto upstream/main
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.conflict == 'false'
        run: git push --force-with-lease origin fix-show-collection-stopiteration

      - name: File issue on conflict
        if: steps.rebase.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Auto-rebase conflict on fix-show-collection-stopiteration';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-rebase',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('Open conflict issue already exists; skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['auto-rebase'],
              body: [
                'Weekly rebase of `fix-show-collection-stopiteration` onto `upstream/main` failed.',
                '',
                'Resolve manually:',
                '```',
                'git fetch upstream main',
                'git checkout fix-show-collection-stopiteration',
                'git rebase upstream/main',
                '# resolve conflicts',
                'git push --force-with-lease',
                '```',
              ].join('\n'),
            });
